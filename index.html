<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="theme-color" content="#F7F9F7"/>
<title>Мой Планер</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#F7F9F7;color:#111827;font-family:'Onest',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:0;height:0}
:root{
  --g:#22C55E;--gm:#16A34A;--gbg:#F0FDF4;
  --bg:#F7F9F7;--card:#fff;--brd:rgba(0,0,0,0.08);--shd:0 1px 4px rgba(0,0,0,0.06);
  --txt:#111827;--sub:#6B7280;--inp:#F9FAFB;--inpb:rgba(0,0,0,0.12);
  --red:#EF4444;--rdbg:#FEF2F2;--ylw:#F59E0B;--ylbg:#FFFBEB;
  --nav:rgba(255,255,255,0.97);--hdr:rgba(247,249,247,0.97);
}
#root{min-height:100vh;padding-bottom:calc(80px + env(safe-area-inset-bottom,0px))}
.hdr{padding:12px 16px 10px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--hdr);backdrop-filter:blur(20px);z-index:50;border-bottom:1px solid var(--brd)}
.hdr-l{display:flex;align-items:center;gap:10px}
.hdr-l img{width:34px;height:34px;border-radius:10px;object-fit:cover;flex-shrink:0}
.hdr-l h1{font-size:17px;font-weight:800;color:var(--gm);letter-spacing:-0.3px}
.hdr-l p{font-size:10px;color:var(--sub)}
.hdr-r{text-align:right}
.hdr-r .pct{font-size:21px;font-weight:800}
.hdr-r .plbl{font-size:9px;color:var(--sub)}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--nav);backdrop-filter:blur(20px);border-top:1px solid var(--brd);display:flex;justify-content:space-around;padding:10px 0 calc(env(safe-area-inset-bottom,0px) + 10px);z-index:100}
.nb{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--sub);cursor:pointer;font-size:8px;font-weight:400;padding:3px 10px;transition:color .2s;font-family:inherit}
.nb.on{color:var(--gm);font-weight:700}
.nb .ic{font-size:20px;line-height:1}
.pg{display:none;padding:12px 14px 16px;min-height:50vh}
.pg.on{display:block}
.card{background:var(--card);border-radius:16px;padding:14px 16px;margin-bottom:10px;border:1px solid var(--brd);box-shadow:var(--shd)}
.card.cg{background:var(--gbg);border-color:rgba(34,197,94,.2)}
.inp{width:100%;padding:11px 14px;border-radius:12px;border:1px solid var(--inpb);background:var(--inp);color:var(--txt);font-size:14px;outline:none;box-sizing:border-box;font-family:inherit;display:block}
.inp:focus{border-color:var(--g)}
.btn{display:block;width:100%;padding:13px 18px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--g),var(--gm));color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center}
.btn:active{opacity:.85}
.bsm{padding:7px 13px;border-radius:10px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
.bg{background:var(--g);color:#fff}
.bgh{background:var(--card);color:var(--sub);border:1px solid var(--brd)}
.brow{display:flex;gap:8px}
.lbl{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block}
.sep{height:1px;background:var(--brd);margin:12px 0}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.scard{background:var(--card);border-radius:14px;padding:12px;border:1px solid var(--brd);box-shadow:var(--shd)}
.sval{font-size:22px;font-weight:800;margin-bottom:5px}
.sbar{height:4px;background:#F3F4F6;border-radius:2px;overflow:hidden}
.sfill{height:100%;border-radius:2px;transition:width .4s}
.trow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--brd)}
.trow:last-child{border-bottom:none}
.tchk{width:22px;height:22px;border-radius:7px;border:2px solid var(--sub);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;flex-shrink:0;cursor:pointer;transition:background .15s,border-color .15s;user-select:none}
.tchk.done{background:var(--g);border-color:var(--g)}
.ttxt{flex:1;min-width:0;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ttxt.done{text-decoration:line-through;opacity:.4}
.hrow{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;margin-bottom:14px}
.hcard{display:flex;flex-direction:column;align-items:center;padding:10px 8px;min-width:68px;background:var(--bg);border-radius:14px;cursor:pointer;border:1.5px solid var(--brd);position:relative;transition:background .15s,border-color .15s;flex-shrink:0;user-select:none}
.hcard.on{background:var(--gbg);border-color:var(--g)}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cday{padding:7px 2px;border-radius:9px;border:1.5px solid var(--brd);background:var(--card);font-size:12px;cursor:pointer;text-align:center;position:relative;font-family:inherit;min-height:32px}
.cday.sel{border-color:var(--g);background:var(--gbg);color:var(--gm);font-weight:700}
.cday.tod{color:var(--g);font-weight:700}
.cdot{width:4px;height:4px;border-radius:50%;background:var(--g);position:absolute;bottom:2px;left:50%;transform:translateX(-50%)}
.cpill{padding:7px 12px;border-radius:20px;border:1.5px solid var(--inpb);background:var(--card);color:var(--sub);font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:inherit;transition:all .15s}
.cpill.ai{border-color:var(--g);background:var(--gbg);color:var(--gm);font-weight:700}
.cpill.ae{border-color:var(--red);background:var(--rdbg);color:var(--red);font-weight:700}
.ttype{display:flex;gap:8px;margin-bottom:12px}
.ttbtn{flex:1;padding:10px;border-radius:10px;border:2px solid var(--inpb);background:var(--card);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.ttbtn.inc{border-color:var(--g);background:var(--gbg);color:var(--gm)}
.ttbtn.exp{border-color:var(--red);background:var(--rdbg);color:var(--red)}
.stabs{display:flex;gap:6px;margin-bottom:12px}
.stab{flex:1;padding:10px 4px;border-radius:11px;border:1px solid var(--brd);background:var(--card);color:var(--sub);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}
.stab.on{background:var(--g);border-color:var(--g);color:#fff;font-weight:700}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;z-index:300}
.modal.open{display:flex}
.mbox{background:var(--card);border-radius:20px 20px 0 0;padding:20px 18px 36px;width:100%;max-height:92vh;overflow-y:auto}
.drow{display:flex;justify-content:space-around;align-items:center}
.dcell{display:flex;flex-direction:column;align-items:center;gap:4px}
.dsub{font-size:11px;color:var(--sub);text-align:center;max-width:90px}
.frow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--brd)}
.frow:last-child{border-bottom:none}
.ugrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.ucard{background:rgba(255,255,255,.8);border-radius:12px;padding:12px;text-align:center;border:1px solid var(--brd)}
.quote{padding:11px 14px;margin-bottom:10px;background:var(--gbg);border-radius:14px;border-left:3px solid var(--g)}
.quote p{font-size:13px;font-style:italic;line-height:1.5}
.quote small{font-size:11px;color:var(--sub);margin-top:4px;display:block}
.pgbar{height:6px;background:rgba(0,0,0,.08);border-radius:3px;overflow:hidden}
.pgfill{height:100%;background:linear-gradient(90deg,var(--g),var(--gm));border-radius:3px;transition:width .5s}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.bg-p{background:var(--gbg);color:var(--gm)}
.bg-r{background:var(--rdbg);color:var(--red)}
.bg-y{background:var(--ylbg);color:var(--ylw)}
.tlbl{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:.4px;font-weight:600;margin-bottom:8px}
/* dropdown popup */
.dropdown{position:absolute;right:0;top:40px;background:var(--card);border-radius:12px;border:1px solid var(--brd);overflow:hidden;z-index:60;min-width:120px;box-shadow:0 8px 24px rgba(0,0,0,.12)}
.dd-item{display:block;width:100%;padding:12px 16px;background:transparent;border:none;font-size:13px;text-align:left;cursor:pointer;font-family:inherit;color:var(--txt)}
.dd-item.on{background:var(--gbg);color:var(--gm);font-weight:700}
.dd-item:hover{background:var(--bg)}
</style>
</head>

// ─── helpers ───
const toKey=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

const parseN=s=>{const n=parseFloat(String(s).replace(/\s/g,'').replace(',','.'));return isNaN(n)?0:n;};

// ─── storage: все ключи явно сохраняем/загружаем ───
const LS_KEYS=['tasks','habits','hh','txns','savings','dream','profile','incCats','expCats','calEvs','cur','isPro','subInfo'];
const lsGet=k=>{try{return JSON.parse(localStorage.getItem('mp_'+k));}catch{return null;}};
const lsSave=(k,v)=>{try{localStorage.setItem('mp_'+k,JSON.stringify(v));}catch{}};

// ─── Telegram CloudStorage sync ───
const TG_CLOUD_KEYS=['tasks','habits','hh','txns','savings','dream','incCats','expCats','calEvs','cur','isPro','subInfo'];

function tgCloudSave(key){
  if(!tg?.CloudStorage)return;
  try{tg.CloudStorage.setItem('mp_'+key,JSON.stringify(S[key]),()=>{});}catch{}
}

function tgCloudSaveAll(){
  if(!tg?.CloudStorage)return;
  TG_CLOUD_KEYS.forEach(k=>{
    try{tg.CloudStorage.setItem('mp_'+k,JSON.stringify(S[k]),()=>{});}catch{}
  });
}

function tgCloudLoadAll(cb){
  if(!tg?.CloudStorage){cb();return;}
  const cloudKeys=TG_CLOUD_KEYS.map(k=>'mp_'+k);
  tg.CloudStorage.getItems(cloudKeys,(err,values)=>{
    if(!err&&values){
      TG_CLOUD_KEYS.forEach(k=>{
        try{
          const v=values['mp_'+k];
          if(v!=null&&v!==''){const parsed=JSON.parse(v);if(parsed!=null)S[k]=parsed;}
        }catch{}
      });
      // fix date objects
      ['anPS','anPE','finPS','finPE'].forEach(k=>{if(S[k]&&typeof S[k]==='string')S[k]=new Date(S[k]);});
      if(!S.anPS||!(S.anPS instanceof Date))S.anPS=firstOM();
      if(!S.anPE||!(S.anPE instanceof Date))S.anPE=now();
      if(!S.finPS||!(S.finPS instanceof Date))S.finPS=firstOM();
      if(!S.finPE||!(S.finPE instanceof Date))S.finPE=now();
      S.dream=S.dream&&typeof S.dream==='object'?S.dream:{name:'',target:0};
      S.dream.target=Number(S.dream.target)||0;
      S.savings=Number(S.savings)||0;
    }
    cb();
  });
}

// Override save to also write to CloudStorage
const _origSave=k=>{lsSave(k,S[k]);};
function save(k){_origSave(k);tgCloudSave(k);}
function saveAll(){LS_KEYS.forEach(k=>_origSave(k));tgCloudSaveAll();}

// ─── Telegram user profile auto-fill ───
function applyTgUserProfile(){
  const user=tg?.initDataUnsafe?.user;
  if(!user)return;
  // Always update TG-sourced fields (they come from TG, not editable)
  S.profile.tgId=user.id;
  S.profile.tgUsername=user.username||'';
  S.profile.tgFirstName=user.first_name||'';
  S.profile.tgLastName=user.last_name||'';
  // Set display name from TG if not manually set
  if(!S.profile.nameLocked){
    S.profile.name=user.first_name+(user.last_name?' '+user.last_name:'');
  }
  // Fetch avatar via Telegram getUserProfilePhotos workaround — use photo_url if available (Bot API only)
  // In WebApp context we use the user's initials as fallback; photo_url is not exposed in initDataUnsafe
  save('profile');
}

// ─── dom helpers ───
const CE=(tag,cls,html)=>{const e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;};
const D=(cls,html)=>CE('div',cls,html);
const Btn=(cls,txt,fn)=>{const b=CE('button',cls,txt);b.onclick=fn;return b;};
let ROOT=null;

// ─── RENDER ───
function render(){
  if(!ROOT)ROOT=document.getElementById('root');
  ROOT.innerHTML='';
  ROOT.appendChild(mkHeader());
  ['today','calendar','finance','analytics','profile'].forEach(id=>{
    const pg=D('pg'+(S.tab===id?' on':''));
    pg.id='pg-'+id;
    if(S.tab===id)pg.appendChild(mkPage(id));
    ROOT.appendChild(pg);
  });
  ROOT.appendChild(mkNav());
}

// ─── partial update for today (no full re-render) ───
function updateToday(){
  const pg=document.getElementById('pg-today');
  if(!pg||!pg.classList.contains('on'))return;
  pg.innerHTML='';
  pg.appendChild(mkToday());
  updateHeader();
}
function updateHeader(){
  const hdr=document.querySelector('.hdr');
  if(!hdr)return;
  const ttasks=S.tasks[TODAY]||[];const tdone=ttasks.filter(t=>t.done).length;
  const hdone=Object.values(S.hh[TODAY]||{}).filter(Boolean).length;
  const tpct=ttasks.length?Math.round(tdone/ttasks.length*100):0;
  const hpct=S.habits.length?Math.round(hdone/S.habits.length*100):0;
  const tot=Math.round((tpct+hpct)/2);
  const pctEl=hdr.querySelector('.pct');
  if(pctEl){pctEl.textContent=tot+'%';pctEl.style.color=tot>=70?GM:'#F59E0B';}
}

// Updates header % AND the two stat cards (tasks + habits)
function updateStatsAndHeader(){
  updateHeader();
  if(S.tab!=='today')return;
  const ttasks=S.tasks[TODAY]||[];
  const tdone=ttasks.filter(t=>t.done).length;
  const hdone=Object.values(S.hh[TODAY]||{}).filter(Boolean).length;
  const tpct=ttasks.length?Math.round(tdone/ttasks.length*100):0;
  const hpct=S.habits.length?Math.round(hdone/S.habits.length*100):0;
  // update stat cards: first = tasks, second = habits
  const scards=document.querySelectorAll('.scard');
  if(scards[0]){
    const fill=scards[0].querySelector('.sfill');
    const val=scards[0].querySelector('.sval');
    if(fill)fill.style.width=tpct+'%';
    if(val)val.childNodes[0].textContent=tdone;
  }
  if(scards[1]){
    const fill=scards[1].querySelector('.sfill');
    const val=scards[1].querySelector('.sval');
    if(fill)fill.style.width=hpct+'%';
    if(val)val.childNodes[0].textContent=hdone;
  }
}

function mkHeader(){
  const ttasks=S.tasks[TODAY]||[];const tdone=ttasks.filter(t=>t.done).length;
  const hdone=Object.values(S.hh[TODAY]||{}).filter(Boolean).length;
  const tpct=ttasks.length?Math.round(tdone/ttasks.length*100):0;

function mkNav(){
  const tabs=[['today','📅','Сегодня'],['calendar','🗓️','Календарь'],['finance','💰','Финансы'],['analytics','📊','Аналитика'],['profile','👤','Профиль']];
  const nav=D('nav');
  tabs.forEach(([id,ic,lbl])=>{
    const b=D('nb'+(S.tab===id?' on':''));
    b.innerHTML=`<span class="ic">${ic}</span>${lbl}`;
    b.onclick=()=>{S.tab=id;haptic('selection');render();};
    nav.appendChild(b);
  });
  return nav;
}

function mkPage(id){
  if(id==='today')return mkToday();
  if(id==='calendar')return mkCalendar();
  if(id==='finance')return mkFinance();
  if(id==='analytics')return mkAnalytics();
  if(id==='profile')return mkProfile();
  return D('');
}

// ══════════════ TODAY ══════════════
function mkToday(){

  const dayEvs=S.calEvs[vKey]||[];
  const ttasks=S.tasks[TODAY]||[];
  const tdone=ttasks.filter(t=>t.done).length;
  const hdone=Object.values(S.hh[TODAY]||{}).filter(Boolean).length;

    const sg=D('sg');
    [['✅','Задачи',tdone,ttasks.length,tpct,G],['🌱','Привычки',hdone,S.habits.length,hpct,'#3B82F6']].forEach(([ic,lb,dn,tot,pct,col])=>{

      ec.appendChild(r);
    });
    wrap.appendChild(ec);
  }

  // Tasks
  const tc=D('card');
  let addTaskOpen=false;
  const th=D('');th.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:'+(vTasks.length?'12px':'0');
  th.innerHTML='<span style="font-size:15px;font-weight:700">📋 Задачи</span>';
  const addTogBtn=Btn('bsm bg','+ Добавить',()=>{addTaskOpen=!addTaskOpen;addFormEl.style.display=addTaskOpen?'block':'none';if(addTaskOpen)setTimeout(()=>taskNameInp.focus(),50);addTogBtn.textContent=addTaskOpen?'✕ Закрыть':'+ Добавить';th.style.marginBottom=addTaskOpen||vTasks.length?'12px':'0';});
  th.appendChild(addTogBtn);tc.appendChild(th);
  // Inline add-task form
  let inlinePri='medium';
  const addFormEl=D('');addFormEl.style.cssText='display:none;margin-bottom:12px;padding:13px;background:var(--bg);border-radius:12px;border:1px solid var(--brd)';
  const taskNameInp=document.createElement('input');taskNameInp.className='inp';taskNameInp.placeholder='Название задачи...';taskNameInp.style.marginBottom='10px';
  const taskTimeInp=document.createElement('input');taskTimeInp.type='time';taskTimeInp.className='inp';taskTimeInp.style.padding='9px 10px';
  const priRow=D('brow');
  const priData2=[['high','🔴','#EF4444','var(--rdbg)'],['medium','🟡','#F59E0B','var(--ylbg)'],['low','🟢',G,GBG]];
  const updateInlinePri=()=>{priRow.querySelectorAll('button').forEach((b,i)=>{b.style.border=`2px solid ${priData2[i][0]===inlinePri?priData2[i][2]:'var(--inpb)'}`;b.style.background=priData2[i][0]===inlinePri?priData2[i][3]:'var(--card)';});};
  priData2.forEach(([v,l,col,bg])=>{const b=document.createElement('button');b.textContent=l;b.style.cssText=`flex:1;padding:9px 2px;border-radius:9px;border:2px solid ${v===inlinePri?col:'var(--inpb)'};background:${v===inlinePri?bg:'var(--card)'};cursor:pointer;font-size:15px;font-family:inherit`;b.onclick=()=>{inlinePri=v;updateInlinePri();};priRow.appendChild(b);});

      hcard.appendChild(iconSpan);hcard.appendChild(nameSpan);hcard.appendChild(streakSpan);hcard.appendChild(checkSpan);

        save('hh');haptic('medium');
        const nd=!!S.hh[vKey][h.id];
        // update card
        hcard.className='hcard'+(nd?' on':'');
        iconSpan.style.opacity=nd?'1':'0.5';
        nameSpan.style.color=nd?GM:'var(--sub)';
        nameSpan.style.fontWeight=nd?'600':'400';
        const st=getStreak(h.id);
        if(st>0){streakSpan.textContent='🔥'+st;streakSpan.style.display='';}
        else{streakSpan.style.display='none';}
        checkSpan.style.display=nd?'':'none';
        // FIX: update stats AND header
        updateStatsAndHeader();
      };
      hcard.onclick=toggleHabit;
      row.appendChild(hcard);
    });
    hc.appendChild(row);
  });
  if(!S.habits.length)hc.innerHTML+='<div style="text-align:center;padding:12px 0;color:var(--sub);font-size:13px">Добавьте первую привычку ☝️</div>';
  wrap.appendChild(hc);
  return wrap;
}

// ══════════════ CALENDAR ══════════════
function mkCalendar(){
  const wrap=D('');
  const mn=D('');mn.style.cssText='display:flex;align-items:center;justify-content:space-between;margin-bottom:12px';
  const navLeft=D('');navLeft.style.cssText='display:flex;align-items:center;gap:8px';
  const prev=Btn('bsm bgh','‹',()=>{const d=new Date(S.calY,S.calM-1,1);S.calM=d.getMonth();S.calY=d.getFullYear();render();});prev.style.padding='7px 12px';
  const next=Btn('bsm bgh','›',()=>{const d=new Date(S.calY,S.calM+1,1);S.calM=d.getMonth();S.calY=d.getFullYear();render();});next.style.padding='7px 12px';
  const mLbl=D('');mLbl.style.cssText='font-weight:700;font-size:14px;min-width:120px;text-align:center';mLbl.textContent=RU_MON[S.calM]+' '+S.calY;
  navLeft.appendChild(prev);navLeft.appendChild(mLbl);navLeft.appendChild(next);
  mn.appendChild(navLeft);

  // FIX: range as POPUP dropdown
  const ranges={1:'День',2:'2 дня',7:'7 дней',30:'30 дней'};
  const rWrap=D('');rWrap.style.position='relative';
  const rBtn=Btn('bsm bgh',ranges[S.calRange]+' ▾',()=>{
    S.calRangeOpen=!S.calRangeOpen;
    const dd=rWrap.querySelector('.dropdown');
    if(dd)dd.style.display=S.calRangeOpen?'block':'none';
  });
  const dd=D('');dd.className='dropdown';dd.style.display='none';
  Object.entries(ranges).forEach(([v,l])=>{
    const item=Btn('dd-item'+(+v===S.calRange?' on':''),l,()=>{
      S.calRange=+v;S.calRangeOpen=false;
      rBtn.textContent=l+' ▾';
      dd.style.display='none';
      // re-render range events only
      render();
    });
    dd.appendChild(item);
  });
  rWrap.appendChild(rBtn);rWrap.appendChild(dd);
  // close on outside click
  document.addEventListener('click',function closeDD(e){if(!rWrap.contains(e.target)){S.calRangeOpen=false;dd.style.display='none';document.removeEventListener('click',closeDD);}},{once:false});
  mn.appendChild(rWrap);
  wrap.appendChild(mn);

  // Mini calendar grid
  const cc=D('card');
  const dh=D('cgrid');dh.style.marginBottom='5px';
  ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].forEach(d=>{const x=D('');x.style.cssText='text-align:center;font-size:10px;color:var(--sub);font-weight:500';x.textContent=d;dh.appendChild(x);});
  cc.appendChild(dh);
  const first=new Date(S.calY,S.calM,1),last=new Date(S.calY,S.calM+1,0);
  const dg=D('cgrid');
  const sw=(first.getDay()+6)%7;for(let i=0;i<sw;i++)dg.appendChild(D(''));
  for(let d=1;d<=last.getDate();d++){
    const date=new Date(S.calY,S.calM,d);const k=toKey(date);
    const isSel=k===S.calSel,isT=k===TODAY;
    const hasEv=(S.calEvs[k]||[]).length>0||(S.tasks[k]||[]).length>0;
    const cb=D('cday'+(isSel?' sel':isT?' tod':''));cb.textContent=d;
    if(hasEv){const dot=D('cdot');cb.appendChild(dot);}
    cb.onclick=()=>{S.calSel=k;haptic('selection');render();};
    dg.appendChild(cb);
  }
  cc.appendChild(dg);wrap.appendChild(cc);

  const eh=D('');eh.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:8px';
  eh.innerHTML='<span style="font-size:13px;color:var(--sub);font-weight:500">События</span>';
  eh.appendChild(Btn('bsm bg','+ Событие',()=>openModal('m-addev',mkAddEvent())));
  wrap.appendChild(eh);

  const base=new Date(S.calSel+'T12:00');
  for(let i=0;i<S.calRange;i++){
    const d=new Date(base);d.setDate(base.getDate()+i);
    const k=toKey(d);const evs=S.calEvs[k]||[];const tks=(S.tasks[k]||[]).filter(t=>!t.done);
    if(!evs.length&&!tks.length&&S.calRange>2)continue;
    const isT=k===TODAY;
    const dc=D('card');dc.style.cssText='border-left:3px solid '+(isT?G:'rgba(0,0,0,.08)')+';padding:12px 14px';
    const dlbl=D('');dlbl.style.cssText='font-size:12px;font-weight:700;margin-bottom:8px;color:'+(isT?GM:'var(--txt)');
    dlbl.textContent=(isT?'Сегодня':fmt(d))+' · '+d.getDate()+' '+RU_MS[d.getMonth()];
    dc.appendChild(dlbl);
    evs.forEach((ev,ei)=>{
      const r=D('');r.style.cssText='display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--brd)';
      r.innerHTML=`<div style="width:3px;height:32px;border-radius:2px;background:${ev.color};flex-shrink:0"></div><div style="flex:1"><div style="font-size:13px">${ev.title}</div>${ev.ts||ev.te?`<div style="font-size:11px;color:var(--sub)">${ev.ts||''}${ev.te?' – '+ev.te:''}</div>`:''}</div>`;
      const del=D('');del.textContent='×';del.style.cssText='font-size:22px;color:var(--red);cursor:pointer;padding:4px 10px;flex-shrink:0;line-height:1';
      del.onclick=e=>{e.stopPropagation();S.calEvs[k]=(S.calEvs[k]||[]).filter(x=>x.id!==ev.id);save('calEvs');haptic('warning');render();};
      r.appendChild(del);dc.appendChild(r);
    });
    tks.forEach(t=>{
      const r=D('');r.style.cssText='display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--brd)';
      r.innerHTML=`<div style="width:3px;height:26px;border-radius:2px;background:#D1D5DB;flex-shrink:0"></div><div style="flex:1"><div style="font-size:13px;color:var(--sub)">${t.text}</div>${t.time?`<div style="font-size:11px;color:#9CA3AF">⏰ ${t.time}</div>`:''}</div>`;
      const goBtn=Btn('bsm','→ День',()=>{S.vDate=new Date(k+'T12:00');S.tab='today';render();});
      goBtn.style.cssText='background:var(--gbg);border:none;color:var(--gm);font-size:11px;cursor:pointer;padding:3px 8px;border-radius:6px;flex-shrink:0;font-family:inherit';
      r.appendChild(goBtn);dc.appendChild(r);
    });
    if(!evs.length&&!tks.length)dc.innerHTML+='<div style="font-size:12px;color:#9CA3AF">Нет событий</div>';
    wrap.appendChild(dc);
  }
  return wrap;
}

// ══════════════ FINANCE ══════════════
// FIX: Finance uses its own local state + direct DOM updates, NOT render()
function mkFinance(){
  const wrap=D('');wrap.style.paddingBottom='24px';

  // Derived values
  const calcFin=()=>{
    const sk=toKey(S.finPS),ek=toKey(S.finPE);
    const pTxns=S.txns.filter(t=>t.date>=sk&&t.date<=ek);
    const inc=pTxns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const exp=pTxns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    const allI=S.txns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
    const allE=S.txns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    const effSav=S.savings+(allI-allE);
    const tgt=Number(S.dream.target)||0;
    const dPct=tgt>0?Math.min(100,Math.round(effSav/tgt*100)):0;
    return {pTxns,inc,exp,bal:inc-exp,allI,allE,effSav,dPct};
  };

  const sym=S.cur.s;

  // Currency
  const curCard=D('card');curCard.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:10px';
  curCard.innerHTML='<div style="font-size:13px;font-weight:600">💱 Валюта</div>';
  const curBtn=Btn('bsm bgh',`${sym} ${S.cur.c} ▾`,()=>openModal('m-cur',mkCurrPicker()));
  curBtn.style.cssText='font-weight:600;color:var(--gm);border-color:rgba(34,197,94,.3)';
  curCard.appendChild(curBtn);wrap.appendChild(curCard);

  // Period selector
  const pc=D('card');pc.innerHTML='<div style="font-size:11px;color:var(--sub);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Период</div>';
  const pr=D('');pr.style.cssText='display:flex;gap:8px;align-items:center';
  const mkPBtn=(d,onSel)=>{
    const b=Btn('bsm bgh',`${d.getDate()} ${RU_MS[d.getMonth()]} ${d.getFullYear()}`,()=>openModal('m-dp-tmp',mkDatePicker(toKey(d),onSel)));
    b.style.cssText='width:100%;text-align:left;font-size:12px';return b;
  };
  const psd=D('');psd.style.flex='1';psd.innerHTML='<div style="font-size:10px;color:var(--sub);margin-bottom:4px">Начало</div>';
  psd.appendChild(mkPBtn(S.finPS,d=>{S.finPS=new Date(d+'T12:00');save('finPS')||lsSave('finPS',S.finPS);render();}));
  const arr=D('');arr.style.cssText='color:var(--sub);font-size:13px;padding-top:14px';arr.textContent='→';
  const ped=D('');ped.style.flex='1';ped.innerHTML='<div style="font-size:10px;color:var(--sub);margin-bottom:4px">Конец</div>';
  ped.appendChild(mkPBtn(S.finPE,d=>{S.finPE=new Date(d+'T12:00');lsSave('finPE',S.finPE);render();}));
  pr.appendChild(psd);pr.appendChild(arr);pr.appendChild(ped);pc.appendChild(pr);wrap.appendChild(pc);

  // Dream block (re-renders on blur only)
  let {pTxns,inc,exp,bal,allI,allE,effSav,dPct}=calcFin();
  const dc=D('card cg');
  const dnRow=D('');dnRow.style.cssText='display:flex;align-items:center;gap:10px;margin-bottom:10px';
  const dnInp=document.createElement('input');dnInp.className='inp';dnInp.value=S.dream.name||'';dnInp.placeholder='Моя мечта / финансовая цель...';
  dnInp.style.cssText='background:transparent;border:none;padding:0;font-size:15px;font-weight:700;flex:1';
  dnInp.oninput=e=>{S.dream.name=e.target.value;};
  dnInp.onblur=()=>{save('dream');};
  dnRow.innerHTML='<span style="font-size:22px">🌟</span>';dnRow.appendChild(dnInp);dc.appendChild(dnRow);
  const drg=D('');drg.style.cssText='display:flex;gap:10px;margin-bottom:10px';
  // savings input
  const si=D('');si.style.flex='1';
  const savLbl=D('lbl',`Накоплено ${sym}`);si.appendChild(savLbl);
  const savInp=document.createElement('input');savInp.type='text';savInp.inputMode='decimal';savInp.className='inp';
  savInp.value=fmtN(S.savings);savInp.style.cssText='font-size:15px;font-weight:800;color:'+GM+';background:rgba(255,255,255,.7)';
  savInp.onfocus=()=>{savInp.value=String(S.savings);savInp.select();};
  savInp.oninput=e=>{const v=parseN(e.target.value);S.savings=v;};
  savInp.onblur=()=>{
    save('savings');
    savInp.value=fmtN(S.savings);
    const calc=calcFin();
    pgFill.style.width=calc.dPct+'%';
    pctLbl.textContent=calc.dPct+'% от цели';
    infoTxt.innerHTML=`+ баланс: <b>${calc.allI-calc.allE>=0?'+':''}${fmtN(calc.allI-calc.allE)} ${sym}</b><br>= Итого: <b>${fmtN(calc.effSav)} ${sym}</b>`;
    updateBalRow(calc);
  };
  si.appendChild(savInp);
  const infoTxt=D('');infoTxt.style.cssText='font-size:10px;color:'+GM+';margin-top:4px';
  infoTxt.innerHTML=`+ баланс: <b>${allI-allE>=0?'+':''}${fmtN(allI-allE)} ${sym}</b><br>= Итого: <b>${fmtN(effSav)} ${sym}</b>`;
  si.appendChild(infoTxt);
  // target input
  const ti=D('');ti.style.flex='1';
  ti.appendChild(D('lbl',`Цель ${sym}`));
  const tgtInp=document.createElement('input');tgtInp.type='text';tgtInp.inputMode='decimal';tgtInp.className='inp';
  tgtInp.value=fmtN(S.dream.target);tgtInp.style.cssText='font-size:15px;font-weight:800;background:rgba(255,255,255,.7)';
  tgtInp.onfocus=()=>{tgtInp.value=String(S.dream.target);tgtInp.select();};
  tgtInp.oninput=e=>{S.dream.target=parseN(e.target.value)||0;};
  tgtInp.onblur=()=>{
    save('dream');tgtInp.value=fmtN(S.dream.target);
    const calc=calcFin();
    pgFill.style.width=calc.dPct+'%';
    pctLbl.textContent=calc.dPct+'% от цели';
  };
  ti.appendChild(tgtInp);
  drg.appendChild(si);drg.appendChild(ti);dc.appendChild(drg);
  const pgDiv=D('');pgDiv.innerHTML=`<div class="pgbar"><div class="pgfill" style="width:${dPct}%"></div></div>`;
  const pgFill=pgDiv.querySelector('.pgfill');
  const pctLbl=D('');pctLbl.style.cssText='text-align:right;margin-top:5px;font-size:11px;font-weight:700;color:'+GM;pctLbl.textContent=dPct+'% от цели';
  dc.appendChild(pgDiv);dc.appendChild(pctLbl);wrap.appendChild(dc);

  // Balance row — updatable
  const balRow=D('');balRow.style.cssText='display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px';
  const mkBalCell=(lb,val,col,pre)=>{
    const c=D('card');c.style.cssText='margin-bottom:0;padding:10px;text-align:center';
    c.innerHTML=`<div style="font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px;font-weight:600">${lb}</div><div style="font-size:12px;font-weight:800;color:${col}">${pre}${fmtN(val)} ${sym}</div>`;
    return c;
  };
  const balCells=[mkBalCell('Доходы',inc,GM,'↓'),mkBalCell('Расходы',exp,'#EF4444','↑'),mkBalCell('Баланс',bal,bal>=0?GM:'#EF4444','')];
  balCells.forEach(c=>balRow.appendChild(c));
  wrap.appendChild(balRow);
  const updateBalRow=calc=>{
    balRow.innerHTML='';
    [['Доходы',calc.inc,GM,'↓'],['Расходы',calc.exp,'#EF4444','↑'],['Баланс',calc.bal,calc.bal>=0?GM:'#EF4444','']].forEach(([lb,v,col,pre])=>balRow.appendChild(mkBalCell(lb,v,col,pre)));
  };

  // Subtabs
  const st=D('stabs');
  [['add','Добавить'],['stats','Статистика'],['cats','Категории']].forEach(([id,lb])=>{
    const b=Btn('stab'+(S.finSub===id?' on':''),lb,()=>{
      S.finSub=id;
      // FIX: update subtabs without full render
      st.querySelectorAll('.stab').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      subContent.innerHTML='';
      subContent.appendChild(mkFinSub(calcFin(),sym));
    });
    st.appendChild(b);
  });
  wrap.appendChild(st);

  // Sub content area
  const subContent=D('');
  subContent.appendChild(mkFinSub(calcFin(),sym));
  wrap.appendChild(subContent);
  return wrap;
}

function mkFinSub(calc,sym){
  const {pTxns,inc,exp,bal}=calc;
  if(S.finSub==='add')return mkFinAdd(sym,calc);
  if(S.finSub==='stats')return mkFinStats(sym,pTxns,inc,exp,bal,calc.effSav);
  if(S.finSub==='cats')return mkFinCats();
  return D('');
}

function mkFinAdd(sym,calc){
  const {pTxns}=calc;
  const ac=D('card');ac.style.marginBottom='16px';

  // Type toggle — FIX: direct DOM update, no render()
  const tt=D('ttype');
  const incB=Btn('ttbtn'+(S.txType==='income'?' inc':''),'↓ Доход',()=>{
    S.txType='income';S.txCat='';
    incB.className='ttbtn inc';expB.className='ttbtn';
    rebuildPills();
  });
  const expB=Btn('ttbtn'+(S.txType==='expense'?' exp':''),'↑ Расход',()=>{
    S.txType='expense';S.txCat='';
    expB.className='ttbtn exp';incB.className='ttbtn';
    rebuildPills();
  });
  tt.appendChild(incB);tt.appendChild(expB);ac.appendChild(tt);

  // Category pills container
  ac.appendChild(D('lbl','Категория'));
  const pillsWrap=D('');pillsWrap.style.cssText='display:flex;overflow-x:auto;gap:6px;padding-bottom:2px;margin-bottom:12px';
  ac.appendChild(pillsWrap);

  const rebuildPills=()=>{
    pillsWrap.innerHTML='';
    const cats=S.txType==='income'?S.incCats:S.expCats;
    cats.forEach(c=>{
      const isOther=c==='Другое';
      const isAct=S.txCat===c&&!isOther;
      const ac2=S.txType==='income'?(isAct?'cpill ai':'cpill'):(isAct?'cpill ae':'cpill');
      const p=Btn(ac2,isOther?'✏️ '+c:c,()=>{
        if(isOther){openModal('m-custom',mkCustomItem(S.txType));}
        else{
          S.txCat=c;
          pillsWrap.querySelectorAll('.cpill').forEach(x=>{x.className='cpill';});
          p.className=S.txType==='income'?'cpill ai':'cpill ae';
        }
      });
      pillsWrap.appendChild(p);
    });
  };
  rebuildPills();

  // Description + Amount
  const ir=D('brow');ir.style.marginBottom='10px';
  const txTxt=document.createElement('input');txTxt.className='inp';txTxt.placeholder='Описание';txTxt.value=S.txText||'';txTxt.style.flex='2';
  txTxt.oninput=e=>S.txText=e.target.value;
  const txAmt=document.createElement('input');txAmt.type='text';txAmt.inputMode='decimal';txAmt.className='inp';txAmt.placeholder='Сумма';txAmt.value=S.txAmt||'';txAmt.style.flex='1';
  txAmt.onfocus=()=>txAmt.select();txAmt.oninput=e=>S.txAmt=e.target.value;
  ir.appendChild(txTxt);ir.appendChild(txAmt);ac.appendChild(ir);

  // Date
  const dateRow=D('');dateRow.style.marginBottom='12px';
  dateRow.appendChild(D('lbl','Дата транзакции'));
  const txDateFmt=(!S.txDate||S.txDate===TODAY)?'Сегодня':(()=>{const d=new Date(S.txDate+'T12:00');return d.getDate()+' '+RU_MS[d.getMonth()];})();
  const dateBtn=Btn('bsm bgh','📅 '+txDateFmt,()=>openModal('m-txd',mkDatePicker(S.txDate||TODAY,d=>{
    S.txDate=d;
    const newFmt=d===TODAY?'Сегодня':(()=>{const dt=new Date(d+'T12:00');return dt.getDate()+' '+RU_MS[dt.getMonth()];})();
    dateBtn.textContent='📅 '+newFmt;
    closeAllModals();
  })));
  dateBtn.style.cssText='width:100%;text-align:left;font-size:13px';
  dateRow.appendChild(dateBtn);ac.appendChild(dateRow);

  // Add button
  const addBtn=Btn('btn','Добавить '+(S.txType==='income'?'доход':'расход'),()=>{
    const txt=S.txText.trim();const amt=parseN(S.txAmt);
    if(!txt||!amt){alert('Заполните название и сумму');return;}
    const cats=S.txType==='income'?S.incCats:S.expCats;
    const cat=S.txCat||cats[0]||'Другое';
    S.txns.push({id:Date.now(),date:S.txDate||TODAY,text:txt,amount:amt,category:cat,type:S.txType});
    save('txns');S.txText='';S.txAmt='';S.txCat='';haptic('success');
    // update history without full render
    txTxt.value='';txAmt.value='';rebuildPills();
    histWrap.innerHTML='';histWrap.appendChild(mkHistory(sym));
    addBtn.textContent='Добавить '+(S.txType==='income'?'доход':'расход');
  });
  addBtn.style.marginBottom='16px';ac.appendChild(addBtn);
  ac.appendChild(D('sep'));
  ac.appendChild(D('','<div style="font-size:13px;font-weight:700;margin-bottom:10px">История за период</div>'));
  const histWrap=D('');
  const mkHistory=sym=>{
    const sk=toKey(S.finPS),ek=toKey(S.finPE);
    const pt=S.txns.filter(t=>t.date>=sk&&t.date<=ek);
    const hw=D('');
    if(!pt.length){hw.innerHTML='<div style="text-align:center;padding:12px 0;color:var(--sub);font-size:13px">Нет транзакций за период</div>';return hw;}
    [...pt].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,25).forEach((t,i,arr)=>{
      const r=D('');r.style.cssText='display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:'+(i<arr.length-1?'1px solid var(--brd)':'none');
      r.innerHTML=`<div style="width:6px;height:6px;border-radius:50%;background:${t.type==='income'?G:'#EF4444'};flex-shrink:0"></div><div style="flex:1;min-width:0"><div style="font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.text}</div><div style="font-size:10px;color:var(--sub)">${t.category} · ${t.date}</div></div><div style="font-size:13px;font-weight:700;color:${t.type==='income'?GM:'#EF4444'};flex-shrink:0">${t.type==='income'?'+':'-'}${fmtN(t.amount)} ${sym}</div>`;
      const del=D('');del.textContent='×';del.style.cssText='font-size:16px;color:var(--sub);cursor:pointer;opacity:.4;flex-shrink:0;padding:0 4px';
      del.onclick=()=>{S.txns=S.txns.filter(x=>x.id!==t.id);save('txns');histWrap.innerHTML='';histWrap.appendChild(mkHistory(sym));};
      r.appendChild(del);hw.appendChild(r);
    });
    return hw;
  };
  histWrap.appendChild(mkHistory(sym));
  ac.appendChild(histWrap);
  return ac;
}

function mkFinStats(sym,pTxns,inc,exp,bal,effSav){
  const sc=D('card');sc.style.marginBottom='16px';
  const sg=D('');sg.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px';

function mkFinCats(){
  const wrap=D('');wrap.style.paddingBottom='16px';
  [['income','↓ Доходы','incCats'],['expense','↑ Расходы','expCats']].forEach(([type,title,key])=>{
    const cc=D('card');cc.style.marginBottom='10px';
    const dotCol=type==='income'?G:'#EF4444';
    const titleCol=type==='income'?GM:'#EF4444';
    // Add-row at bottom
    const addRow=D('brow');addRow.style.marginTop='12px';
    const ni=document.createElement('input');ni.className='inp';ni.placeholder='Новая категория...';ni.style.flex='1';
    const addFn=()=>{
      const val=ni.value.trim();if(!val)return;
      S[key]=[...S[key],val];save(key);ni.value='';haptic('success');
      rebuildList();
    };
    ni.onkeydown=e=>{if(e.key==='Enter')addFn();};
    addRow.appendChild(ni);addRow.appendChild(Btn('bsm bg','+',addFn));
    cc.appendChild(addRow);
    // Rebuild: clear everything above addRow, re-add title + rows
    const rebuildList=()=>{
      const children=[...cc.childNodes];
      children.forEach(ch=>{if(ch!==addRow)cc.removeChild(ch);});
      const titleDiv=D('');titleDiv.style.cssText=`font-size:14px;font-weight:700;margin-bottom:12px;color:${titleCol}`;titleDiv.textContent=title;
      cc.insertBefore(titleDiv,addRow);
      // snapshot current list for correct index closures
      const currentList=[...S[key]];
      currentList.forEach((c,i)=>{
        const r=D('');r.style.cssText='display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--brd)';
        r.innerHTML=`<div style="width:7px;height:7px;border-radius:50%;background:${dotCol};flex-shrink:0"></div><span style="flex:1;font-size:13px">${c}</span>`;
        if(currentList.length>1){
          const del=D('');del.textContent='×';
          del.style.cssText='font-size:18px;color:var(--sub);cursor:pointer;opacity:.5;padding:4px 10px;min-width:36px;min-height:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0';
          del.onclick=e=>{
            e.stopPropagation();e.preventDefault();
            // find current index of this item (by value) in case list changed
            const idx2=S[key].indexOf(c);
            if(idx2>-1){S[key]=[...S[key].slice(0,idx2),...S[key].slice(idx2+1)];save(key);haptic('warning');}
            rebuildList();
          };
          r.appendChild(del);
        }
        cc.insertBefore(r,addRow);
      });
    };
    rebuildList();
    wrap.appendChild(cc);
  });
  return wrap;
}


// ══════════════ ANALYTICS ══════════════
function mkAnalytics(){
  const wrap=D('');
  const sk=toKey(S.anPS),ek=toKey(S.anPE);
  const pc=D('card');pc.innerHTML='<div style="font-size:11px;color:var(--sub);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Период</div>';

  const p1=D('');p1.style.flex='1';p1.innerHTML='<div style="font-size:10px;color:var(--sub);margin-bottom:4px">Начало</div>';p1.appendChild(mkPB(S.anPS,()=>openModal('m-aps',mkDatePicker(sk,d=>{S.anPS=new Date(d+'T12:00');lsSave('anPS',S.anPS);render();}))));
  const arr=D('');arr.style.cssText='color:var(--sub);font-size:13px;padding-top:14px';arr.textContent='→';

  pr.appendChild(p1);pr.appendChild(arr);pr.appendChild(p2);pc.appendChild(pr);wrap.appendChild(pc);

  const days=[];const cur=new Date(S.anPS);
  while(toKey(cur)<=ek){days.push(toKey(cur));cur.setDate(cur.getDate()+1);}
  let tTot=0,tDone=0,hTot=0,hDoneN=0;
  days.forEach(k=>{const dt=S.tasks[k]||[];tTot+=dt.length;tDone+=dt.filter(t=>t.done).length;const dh=S.hh[k]||{};hTot+=S.habits.length;hDoneN+=Object.values(dh).filter(Boolean).length;});
  const tPct=tTot>0?Math.round(tDone/tTot*100):0;
  const hPct=hTot>0?Math.round(hDoneN/hTot*100):0;
  const pTxns=S.txns.filter(t=>t.date>=sk&&t.date<=ek);
  const inc=pTxns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const exp=pTxns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const allI=S.txns.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const allE=S.txns.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const effSav=S.savings+(allI-allE);
  const sym=S.cur.s;

  const dc=D('card');dc.innerHTML='<div style="font-size:14px;font-weight:700;margin-bottom:14px">📊 Прогресс за период</div>';
  const drow=D('drow');drow.appendChild(mkDonut(tPct,G,'задачи',`${tDone} из ${tTot}`));drow.appendChild(mkDonut(hPct,'#3B82F6','привычки',`${hDoneN} из ${hTot}`));
  dc.appendChild(drow);wrap.appendChild(dc);

  const fc=D('card');fc.innerHTML=`<div style="font-size:14px;font-weight:700;margin-bottom:12px">💰 Финансы за период</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px"><div style="padding:10px;background:var(--gbg);border-radius:12px;text-align:center"><div style="font-size:9px;color:var(--sub);font-weight:600;margin-bottom:4px;text-transform:uppercase">Доход</div><div style="font-size:13px;font-weight:800;color:${GM}">+${fmtN(inc)}</div><div style="font-size:9px;color:var(--sub)">${sym}</div></div><div style="padding:10px;background:var(--rdbg);border-radius:12px;text-align:center"><div style="font-size:9px;color:var(--sub);font-weight:600;margin-bottom:4px;text-transform:uppercase">Расход</div><div style="font-size:13px;font-weight:800;color:#EF4444">-${fmtN(exp)}</div><div style="font-size:9px;color:var(--sub)">${sym}</div></div><div style="padding:10px;background:var(--gbg);border-radius:12px;text-align:center"><div style="font-size:9px;color:var(--sub);font-weight:600;margin-bottom:4px;text-transform:uppercase">Накоп.</div><div style="font-size:13px;font-weight:800;color:${GM}">${fmtN(effSav)}</div><div style="font-size:9px;color:var(--sub)">${sym}</div></div></div>`;
  wrap.appendChild(fc);

  const lc=D('card');lc.innerHTML='<div style="font-size:14px;font-weight:700;margin-bottom:4px">📈 Эффективность по дням</div><div style="font-size:11px;color:var(--sub);margin-bottom:12px">Нажмите на точку для просмотра</div>';
  const chartData=days.map(k=>{const dt=S.tasks[k]||[];const tD=dt.filter(t=>t.done).length;const tP=dt.length?Math.round(tD/dt.length*100):0;const dh=S.hh[k]||{};const hD=Object.values(dh).filter(Boolean).length;const hP=S.habits.length?Math.round(hD/S.habits.length*100):0;return{date:k,pct:Math.round((tP+hP)/2)};}).filter(d=>S.tasks[d.date]||S.hh[d.date]);
  lc.appendChild(mkLineChart(chartData,G));
  wrap.appendChild(lc);
  return wrap;

function openModal(id,content){
  closeAllModals();
  let m=document.getElementById('modal-'+id);
  if(!m){m=D('modal');m.id='modal-'+id;document.body.appendChild(m);}
  const box=D('mbox');box.appendChild(content);
  m.innerHTML='';m.appendChild(box);
  m.className='modal open';
  m.onclick=e=>{if(e.target===m)closeAllModals();};
}
function closeAllModals(){document.querySelectorAll('.modal.open').forEach(m=>m.className='modal');}

function mkDatePicker(selected,onSelect){
  let m=selected?new Date(selected+'T12:00').getMonth():now().getMonth();
  let y=selected?new Date(selected+'T12:00').getFullYear():now().getFullYear();
  const wrap=D('');
  const build=()=>{
    wrap.innerHTML='';
    const nav=D('');nav.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:14px';
    const prev=Btn('bsm bgh','‹',()=>{const d=new Date(y,m-1,1);m=d.getMonth();y=d.getFullYear();build();});prev.style.padding='7px 14px';
    const next=Btn('bsm bgh','›',()=>{const d=new Date(y,m+1,1);m=d.getMonth();y=d.getFullYear();build();});next.style.padding='7px 14px';
    const mLbl=D('');mLbl.style.cssText='font-weight:700;font-size:15px';mLbl.textContent=RU_MON[m]+' '+y;
    nav.appendChild(prev);nav.appendChild(mLbl);nav.appendChild(next);wrap.appendChild(nav);
    const dh=D('cgrid');dh.style.marginBottom='6px';
    ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].forEach(d=>{const x=D('');x.style.cssText='text-align:center;font-size:10px;color:var(--sub);font-weight:500';x.textContent=d;dh.appendChild(x);});
    wrap.appendChild(dh);
    const first=new Date(y,m,1),last=new Date(y,m+1,0);
    const dg=D('cgrid');
    const sw=(first.getDay()+6)%7;for(let i=0;i<sw;i++)dg.appendChild(D(''));
    for(let d=1;d<=last.getDate();d++){
      const date=new Date(y,m,d);const k=toKey(date);
      const isSel=k===selected,isT=k===TODAY;
      const cb=D('cday'+(isSel?' sel':isT?' tod':''));cb.textContent=d;
      cb.onclick=()=>{onSelect(k);closeAllModals();};
      dg.appendChild(cb);
    }
    wrap.appendChild(dg);
  };
  build();return wrap;
}

function mkAddTask(vKey){

    b.style.cssText=`flex:1;padding:9px 2px;border-radius:9px;border:2px solid ${v===pri?col:'var(--inpb)'};background:${v===pri?bg:'var(--card)'};cursor:pointer;font-size:15px;font-family:inherit`;

function mkCustomItem(type){
  const wrap=D('');
  const title=D('');title.innerHTML='<div style="font-size:17px;font-weight:700;margin-bottom:6px">Своя запись</div><div style="font-size:13px;color:var(--sub);margin-bottom:14px">Добавьте запись и выберите категорию</div>';
  wrap.appendChild(title);
  const descInp=document.createElement('input');descInp.className='inp';descInp.placeholder='Описание';descInp.style.marginBottom='10px';
  const amtInp=document.createElement('input');amtInp.type='text';amtInp.inputMode='decimal';amtInp.className='inp';amtInp.placeholder='Сумма';amtInp.style.marginBottom='12px';
  amtInp.onfocus=()=>amtInp.select();
  wrap.appendChild(descInp);wrap.appendChild(amtInp);
  wrap.appendChild(D('lbl','Категория'));
  let selCat='';let isNew=false;let newCatVal='';
  // Pill row - stable container
  const pillsWrap=D('');pillsWrap.style.cssText='display:flex;overflow-x:auto;gap:6px;padding-bottom:2px;margin-bottom:10px';
  wrap.appendChild(pillsWrap);
  // New category input - always in DOM, shown/hidden via display
  const newCatInp=document.createElement('input');newCatInp.className='inp';newCatInp.placeholder='Название новой категории...';newCatInp.style.cssText='margin-bottom:12px;display:none';
  newCatInp.oninput=e=>{newCatVal=e.target.value;};
  wrap.appendChild(newCatInp);
  // Rebuild only the pills, never touch newCatInp DOM position
  const buildPills=()=>{
    pillsWrap.innerHTML='';
    const clist=(type==='income'?S.incCats:S.expCats).filter(x=>x!=='Другое');
    clist.forEach(c=>{
      const isAct=(selCat===c)&&!isNew;
      const cls='cpill'+(isAct?(type==='income'?' ai':' ae'):'');
      const p=Btn(cls,c,()=>{
        selCat=c;isNew=false;
        newCatInp.style.display='none';newCatInp.value='';newCatVal='';
        // update pills active state without full rebuild
        pillsWrap.querySelectorAll('.cpill').forEach(x=>{x.className='cpill';});
        p.className='cpill'+(type==='income'?' ai':' ae');
      });
      pillsWrap.appendChild(p);
    });
    const ac=isNew?(type==='income'?' ai':' ae'):'';
    const nb=Btn('cpill'+ac,'+ Новая',()=>{
      isNew=true;selCat='';
      newCatInp.style.display='block';
      setTimeout(()=>{newCatInp.focus();},60);
      // just update pill styles
      pillsWrap.querySelectorAll('.cpill').forEach(x=>{x.className='cpill';});
      nb.className='cpill'+(type==='income'?' ai':' ae');
    });
    pillsWrap.appendChild(nb);
  };
  buildPills();
  const btns=D('brow');btns.style.marginTop='4px';
  btns.appendChild(Btn('bsm bgh','Отмена',closeAllModals));
  btns.appendChild(Btn('bsm bg','Сохранить',()=>{
    const txt=descInp.value.trim();
    const amt=parseN(amtInp.value);
    if(!txt||!amt){alert('Заполните описание и сумму');return;}
    let cat='';
    if(isNew){
      cat=(newCatInp.value||newCatVal||'').trim();
      if(!cat){alert('Введите название новой категории');return;}
      if(type==='income'){if(!S.incCats.includes(cat)){S.incCats=[...S.incCats.filter(x=>x!=='Другое'),cat,'Другое'];save('incCats');}}
      else{if(!S.expCats.includes(cat)){S.expCats=[...S.expCats.filter(x=>x!=='Другое'),cat,'Другое'];save('expCats');}}
    } else {
      cat=selCat;
      if(!cat){
        // auto-select first cat
        const cats=(type==='income'?S.incCats:S.expCats).filter(x=>x!=='Другое');
        cat=cats[0]||'Другое';
      }
    }
    S.txns.push({id:Date.now(),date:S.txDate||TODAY,text:txt,amount:amt,category:cat,type});
    save('txns');haptic('success');closeAllModals();render();
  }));
  wrap.appendChild(btns);
  setTimeout(()=>descInp.focus(),80);
  return wrap;
}

function mkDonut(pct,color,label,sub){
  const r=32,cx=40,cy=40,circ=2*Math.PI*r,dash=(pct/100)*circ;
  const cell=D('dcell');
  cell.innerHTML=`<svg width="90" height="90" viewBox="0 0 80 80"><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#F3F4F6" stroke-width="10"/><circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="10" stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${circ/4}" stroke-linecap="round"/><text x="${cx}" y="${cy-4}" text-anchor="middle" font-size="14" font-weight="800" fill="${color}" font-family="Onest,system-ui">${pct}%</text><text x="${cx}" y="${cy+12}" text-anchor="middle" font-size="9" fill="#6B7280" font-family="Onest,system-ui">${label}</text></svg><div class="dsub">${sub}</div>`;
  return cell;
}

function mkLineChart(data,color){
  if(!data||data.length<2)return D('','<div style="text-align:center;padding:24px 0;color:var(--sub);font-size:13px">Недостаточно данных</div>');
  const W=300,H=120,PL=28,PR=8,PT=12,PB=28;
  const xs=data.map((d,i)=>PL+(i/(data.length-1))*(W-PL-PR));
  const ys=data.map(d=>PT+(H-PT-PB)*(1-d.pct/100));
  const pts=xs.map((x,i)=>`${x},${ys[i]}`).join(' ');
  const fill=`${xs[0]},${H-PB} ${pts} ${xs[xs.length-1]},${H-PB}`;
  const wrap=D('');wrap.style.cssText='overflow-x:auto;-webkit-overflow-scrolling:touch';
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('width',Math.max(W,data.length*30));svg.setAttribute('height',H);svg.style.display='block';
  const mk=(tag,attrs)=>{const e=document.createElementNS(ns,tag);Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));return e;};
  [0,25,50,75,100].forEach(v=>{const y=PT+(H-PT-PB)*(1-v/100);svg.appendChild(mk('line',{x1:PL,y1:y,x2:W-PR,y2:y,stroke:'#F3F4F6','stroke-width':1}));const t=mk('text',{x:PL-4,y:y+4,'font-size':8,fill:'#6B7280','text-anchor':'end'});t.textContent=v;svg.appendChild(t);});
  svg.appendChild(mk('polyline',{points:fill,fill:color+'15',stroke:'none'}));
  svg.appendChild(mk('polyline',{points:pts,fill:'none',stroke:color,'stroke-width':2.5,'stroke-linecap':'round','stroke-linejoin':'round'}));
  let tipG=mk('g',{});svg.appendChild(tipG);
  let activeIdx=-1;
  data.forEach((d,i)=>{
    const circ2=mk('circle',{cx:xs[i],cy:ys[i],r:4,fill:'#fff',stroke:color,'stroke-width':2});
    circ2.style.cursor='pointer';
    circ2.onclick=()=>{tipG.innerHTML='';activeIdx=activeIdx===i?-1:i;if(activeIdx===i){const rect=mk('rect',{x:xs[i]-28,y:ys[i]-34,width:56,height:26,rx:6,fill:'#111827'});const t1=mk('text',{x:xs[i],y:ys[i]-18,'text-anchor':'middle','font-size':11,fill:'#fff','font-weight':800});t1.textContent=d.pct+'%';const t2=mk('text',{x:xs[i],y:ys[i]-7,'text-anchor':'middle','font-size':8,fill:'rgba(255,255,255,.7)'});t2.textContent=d.date.slice(5).replace('-','.');tipG.appendChild(rect);tipG.appendChild(t1);tipG.appendChild(t2);}};
    svg.appendChild(circ2);
    const step=Math.ceil(data.length/7);if(data.length<=10||i%step===0){const tl=mk('text',{x:xs[i],y:H-4,'text-anchor':'middle','font-size':8,fill:'#6B7280'});tl.textContent=d.date.slice(5).replace('-','.');svg.appendChild(tl);}
  });
  wrap.appendChild(svg);return wrap;
}

// ══════════════ UTILS ══════════════
function getStreak(id){let s=0;const d=new Date(now());while(S.hh[toKey(d)]?.[id]){s++;d.setDate(d.getDate()-1);}return s;}

// ══════════════ INIT ══════════════
if(tg){tg.ready();tg.expand();}
// Load from localStorage first (instant), then sync from TG CloudStorage
LS_KEYS.forEach(k=>{const v=lsGet(k);if(v!=null)S[k]=v;});
['anPS','anPE','finPS','finPE'].forEach(k=>{if(S[k]&&typeof S[k]==='string')S[k]=new Date(S[k]);});
if(!S.anPS||!(S.anPS instanceof Date))S.anPS=firstOM();
if(!S.anPE||!(S.anPE instanceof Date))S.anPE=now();
if(!S.finPS||!(S.finPS instanceof Date))S.finPS=firstOM();
if(!S.finPE||!(S.finPE instanceof Date))S.finPE=now();
if(!S.txDate)S.txDate=TODAY;
if(!S.dream||typeof S.dream!=='object')S.dream={name:'',target:0};
S.dream.target=Number(S.dream.target)||0;
S.savings=Number(S.savings)||0;

applyTgUserProfile();
render(); // render immediately from localStorage

// Then load from CloudStorage (sync across devices) and re-render if data differs
tgCloudLoadAll(()=>{
  applyTgUserProfile();
  // also sync localStorage from cloud result
  LS_KEYS.forEach(k=>lsSave(k,S[k]));
  render();
});

// Save all state on page hide (important for data persistence)
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden')saveAll();});
window.addEventListener('pagehide',saveAll);
</script>
